<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | Virtual Interior Designer</title>

    <link rel="stylesheet" href="css/login.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Background -->

    <div class="background">
      <div class="circle circle1"></div>

      <div class="circle circle2"></div>

      <div class="circle circle3"></div>
    </div>

    <!-- Login Card -->

    <div class="login-container">
      <div class="login-card">
        <!-- Logo -->

        <div class="logo">🏠</div>

        <h1>
          Welcome to

          <span>Virtual Interior Designer</span>
        </h1>

        <p>Continue to access your personal design workspace.</p>

        <!-- Dynamic Form -->

        <form id="authForm">
          <!-- Email Step -->

          <div class="form-step active" id="emailStep">
            <label>Email Address</label>

            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />

            <button type="submit" id="continueBtn">Continue →</button>
          </div>
          <!-- Password Step -->

          <div class="form-step" id="passwordStep">
            <label>Email Address</label>

            <input type="email" id="existingEmail" readonly />

            <label>Password</label>

            <input
              type="password"
              id="loginPassword"
              placeholder="Enter your password"
            />

            <button type="button" id="loginBtn">Login →</button>

            <button type="button" class="back-btn" id="backToEmail1">
              ← Change Email
            </button>
          </div>

          <!-- OTP Step -->

          <div class="form-step" id="otpStep">
            <label>Email Address</label>

            <input type="email" id="otpEmail" readonly />

            <label>Verification Code</label>

            <input
              type="text"
              id="otp"
              maxlength="6"
              placeholder="Enter 6-digit OTP"
            />

            <button type="button" id="verifyOtpBtn">Verify OTP →</button>

            <button type="button" class="secondary-btn" id="resendOtpBtn">
              Resend OTP
            </button>

            <button type="button" class="back-btn" id="backToEmail2">
              ← Change Email
            </button>
          </div>

          <!-- Register Step -->
         
          <div class="form-step" id="registerStep">
            <label>Email Address</label>

            <input type="email" id="registerEmail" readonly />

            <label>Create Password</label>

            <input
              type="password"
              id="newPassword"
              placeholder="Create Password"
            />

            <label>Confirm Password</label>

            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm Password"
            />

            <button type="button" id="registerBtn">Create Account →</button>

            <button type="button" class="back-btn" id="backToOtp">
              ← Back
            </button>
          </div>

          <!-- Status Message -->

          <div id="message" class="message"></div>

          <!-- Loader -->

          <div id="loader" class="loader hidden">
            <div class="spinner"></div>

            <span>Please wait...</span>
          </div>
        </form>
        <!-- Footer -->

        <div class="login-footer">
          <a href="index.html" class="home-link"> ← Back to Home </a>

          <p>
            Don't have an account?

            <span> Simply enter your email to get started. </span>
          </p>
        </div>
      </div>
    </div>

    <!-- Copyright -->

    <footer>
      © 2026 Virtual Interior Designer • Designed & Developed by
      <strong>B Lahari</strong>
    </footer>

    <!-- JavaScript -->

    <script src="js/login.js"></script>
  </body>
</html>
